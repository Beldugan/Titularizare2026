<meta name="apple-mobile-web-app-capable" content="yes"><meta name="theme-color" content="#f2f2f7">
<title>Titularizare 2026 · Mecanică Constanța</title>
<style>
:root{--bg:#f2f2f7;--card:#fff;--sep:#e5e5ea;--txt:#1c1c1e;--sub:#8a8a8e;--blue:#007aff;--nav:rgba(249,249,249,.82);--seg:#e4e4e9}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'SF Pro Text','Segoe UI',Roboto,Helvetica,Arial,sans-serif;background:var(--bg);color:var(--txt);-webkit-font-smoothing:antialiased}
.app{max-width:640px;margin:0 auto;min-height:100vh;padding-bottom:34px}
.nav{position:sticky;top:0;z-index:10;background:var(--nav);backdrop-filter:saturate(180%) blur(20px);-webkit-backdrop-filter:saturate(180%) blur(20px);border-bottom:.5px solid var(--sep)}
.nav-in{display:flex;align-items:center;height:44px;padding:0 8px;position:relative}
.back{color:var(--blue);font-size:17px;display:flex;align-items:center;gap:3px;background:none;border:0;cursor:pointer;padding:6px 8px;font-family:inherit}
.back svg{width:12px;height:20px}
.nav-title{position:absolute;left:50%;transform:translateX(-50%);font-size:17px;font-weight:600;white-space:nowrap;max-width:56%;overflow:hidden;text-overflow:ellipsis}
.large{padding:6px 20px 8px;font-size:32px;font-weight:700;letter-spacing:-.5px;line-height:1.1}
.subhead{padding:18px 20px 6px;font-size:13px;font-weight:600;text-transform:uppercase;letter-spacing:.4px;color:var(--sub)}
.list{background:var(--card);margin:0 16px 22px;border-radius:12px;overflow:hidden}
.row{display:flex;align-items:center;gap:12px;padding:12px 16px;border-bottom:.5px solid var(--sep);cursor:pointer;background:var(--card)}
.row:last-child{border-bottom:0}
.row:active{background:#e9e9ee}
.row-main{flex:1;min-width:0}
.row-title{font-size:17px;line-height:1.3}
.row-sub{font-size:13px;color:var(--sub);margin-top:2px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.badge{font-size:13px;color:var(--sub);white-space:nowrap;font-variant-numeric:tabular-nums}
.chev{width:8px;height:14px;color:#c4c4c6;flex:none}
.count{margin-left:auto;font-size:16px;color:var(--sub);font-variant-numeric:tabular-nums}
.empty{margin:0 16px;padding:40px 20px;text-align:center;color:var(--sub);font-size:15px;background:var(--card);border-radius:12px}
.seg{display:flex;margin:2px 16px 16px;background:var(--seg);border-radius:9px;padding:2px}
.seg button{flex:1;border:0;background:none;padding:7px 4px;font-size:13px;font-weight:500;border-radius:7px;color:var(--txt);font-family:inherit;cursor:pointer;transition:.15s}
.seg button.on{background:var(--card);box-shadow:0 1px 3px rgba(0,0,0,.12);font-weight:600}
.detail{padding:8px 0}
.field{background:var(--card);margin:0 16px 12px;border-radius:12px;overflow:hidden}
.field h4{margin:0;padding:12px 16px 6px;font-size:13px;font-weight:600;color:var(--blue)}
.kv{display:flex;padding:8px 16px;border-top:.5px solid var(--sep);font-size:15px;gap:14px;line-height:1.35}
.kv .k{color:var(--sub);flex:0 0 42%;min-width:0}
.kv .v{flex:1;text-align:right;word-break:break-word;font-weight:500}
.plain{padding:9px 16px 11px;font-size:15px;line-height:1.4;border-top:.5px solid var(--sep)}
.field h4+.plain{border-top:0}
.hero{margin:0 16px 14px;padding:16px;background:var(--card);border-radius:12px}
.hero .nm{font-size:21px;font-weight:700;line-height:1.2}
.hero .ds{color:var(--sub);margin-top:5px;font-size:14px}
.hint{color:var(--sub);font-size:12px;text-align:center;padding:2px 20px 26px}
.view{animation:fade .2s ease}
@keyframes fade{from{opacity:0;transform:translateX(10px)}to{opacity:1;transform:none}}
@media(prefers-color-scheme:dark){:root{--bg:#000;--card:#1c1c1e;--sep:#38383a;--txt:#fff;--sub:#8d8d93;--nav:rgba(20,20,22,.8);--seg:#2c2c2e}.row:active{background:#2c2c2e}}
</style></head>

const CAND=[{key:'ci_nip',title:'Candidați înscriși',name:2,sub:1},{key:'ci_raa',title:'Repartizări ani anteriori',name:1,sub:2}];
const POST=[{key:'pct_lud',title:'Vacante NEDET complete'},{key:'pct_in_lud',title:'Vacante NEDET incomplete'},{key:'pcnt_lud',title:'Vacante DET complete'},{key:'pil',title:'Vacante DET incomplete'}];
const FRIENDLY={ci_nip:['Număr fișă','Disciplina de examen','Nume și prenume','Domiciliu','Studii de bază','Studii de master','Statut anterior și medii','Probe practice / inspecție','Probe orale / bilingv','Avize și atestate','Alte informații','Titular la'],ci_raa:['Număr fișă','Nume și prenume','Domiciliu','Studii de bază','Studii de master','Statut anterior','Avize și atestate','Alte informații','Informații','Examen 2023','Examen 2021'],POST:['Cod post','Localitate [Mediu]','Unitate de învățământ','Nivel de învățământ','Disciplină [Alte discipline]','Ore (trunchi comun / opționale)','Detalii','Viabilitate / statut','Tip post','Probă practică / inspecție','Probă intensiv-bilingv / orală','Avize și atestate']};
const CHEV="<svg class=\"chev\" viewBox=\"0 0 8 14\" fill=\"none\"><path d=\"M1 1l6 6-6 6\" stroke=\"currentColor\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"/></svg>",BACK="<svg viewBox=\"0 0 12 20\" fill=\"none\"><path d=\"M11 1L2 10l9 9\" stroke=\"currentColor\" stroke-width=\"2.2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"/></svg>";
const app=document.getElementById('app');let stack=[];
function esc(s){return (s==null?'':String(s)).replace(/[&<>]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[c]));}
function nav(t,b){return '<div class="nav"><div class="nav-in">'+(b?'<button class="back" onclick="back()">'+BACK+'Înapoi</button>':'')+'<div class="nav-title">'+esc(t)+'</div></div></div>';}
function render(){stack[stack.length-1].render();}
function push(v){stack.push(v);render();}
function back(){if(stack.length>1){stack.pop();render();window.scrollTo(0,0);}}
function isMaistru(r){return /INSTRUIRE PRACTICA/i.test(r[4]||'');}
function setPF(k){const v=stack[stack.length-1];v.filter=k;v.render();}
function parseNum(s){const P=String(s).split(' | ');const map={};let ok=false;for(const p of P){const m=p.match(/^\s*(\d+)\.\s*([\s\S]*)$/);if(m){map[+m[1]]=m[2].replace(/\s+/g,' ').trim();ok=true;}}return ok?map:null;}
function secTitle(hd,schema,i){const pre=String(hd).split(/\d+\./)[0].replace(/[|:\s]+$/,'').trim();return pre||(FRIENDLY[schema]&&FRIENDLY[schema][i])||('Câmp '+(i+1));}
function home(){return{render(){let h=nav('Titularizare 2026',false);h+='<div class="view"><div class="large">Mecanică · Constanța</div><div class="subhead">Candidați</div><div class="list">';
 CAND.forEach((c,i)=>{h+='<div class="row" onclick="push(candList('+i+'))"><div class="row-main"><div class="row-title">'+esc(c.title)+'</div></div><span class="count">'+DATA[c.key].rows.length+'</span>'+CHEV+'</div>';});
 h+='</div><div class="subhead">Posturi</div><div class="list">';
 POST.forEach((p,i)=>{h+='<div class="row" onclick="push(postList('+i+'))"><div class="row-main"><div class="row-title">'+esc(p.title)+'</div></div><span class="count">'+DATA[p.key].rows.length+'</span>'+CHEV+'</div>';});
 h+='</div><div class="hint">Profesor și maistru instructor · disciplina mecanică</div></div>';app.innerHTML=h;}};}
function candList(i){const c=CAND[i];return{render(){const d=DATA[c.key];let h=nav(c.title,true)+'<div class="view"><div class="large">'+esc(c.title)+'</div>';
 if(!d.rows.length)h+='<div class="empty">Niciun candidat pe disciplina mecanică.</div>';
 else{h+='<div class="list">';d.rows.forEach((r,ri)=>{const nm=r[c.name]||'—';const sub=(r[c.sub]||'').split(' | ')[0];h+='<div class="row" onclick="push(detail(\''+c.key+'\','+ri+'))"><div class="row-main"><div class="row-title">'+esc(nm)+'</div>'+(sub?'<div class="row-sub">'+esc(sub)+'</div>':'')+'</div>'+CHEV+'</div>';});h+='</div>';}
 app.innerHTML=h+'</div>';window.scrollTo(0,0);}};}
function postList(i){const p=POST[i];return{filter:'all',render(){const v=this;const d=DATA[p.key];let rows=d.rows.map((r,idx)=>[r,idx]);
 if(v.filter==='prof')rows=rows.filter(x=>!isMaistru(x[0]));else if(v.filter==='mai')rows=rows.filter(x=>isMaistru(x[0]));
 let h=nav(p.title,true)+'<div class="view"><div class="large">'+esc(p.title)+'</div>';
 if(d.rows.length){const opt=[['all','Toate'],['prof','Profesor'],['mai','Maiștri']];h+='<div class="seg">'+opt.map(o=>'<button class="'+(v.filter===o[0]?'on':'')+'" onclick="setPF(\''+o[0]+'\')">'+o[1]+'</button>').join('')+'</div>';}
 if(!rows.length)h+='<div class="empty">Niciun post pentru acest filtru.</div>';
 else{h+='<div class="list">';rows.forEach(pr=>{const r=pr[0],ri=pr[1];const inst=(r[2]||'').split(' | ')[0];const city=(r[1]||'').split(' | ')[0];const ore=(r[5]||'').trim();const tag=isMaistru(r)?'Maistru':'Profesor';h+='<div class="row" onclick="push(detail(\''+p.key+'\','+ri+'))"><div class="row-main"><div class="row-title">'+esc(inst)+'</div><div class="row-sub">'+esc(city)+' · '+tag+'</div></div><span class="badge">'+esc(ore)+' ore</span>'+CHEV+'</div>';});h+='</div>';}
 app.innerHTML=h+'</div>';window.scrollTo(0,0);}};}
function detail(key,ri){return{render(){const d=DATA[key];const r=d.rows[ri];const schema=(key==='ci_nip')?'ci_nip':(key==='ci_raa'?'ci_raa':'POST');const isCand=(key==='ci_nip'||key==='ci_raa');const nameCol=(key==='ci_nip')?2:(key==='ci_raa'?1:2);
 const heroName=r[nameCol]||'';const heroSub=isCand?((r[key==='ci_nip'?1:0]||'').split(' | ')[0]):((r[1]||'').split(' | ')[0]);
 let h=nav('Detalii',true)+'<div class="view detail"><div class="hero"><div class="nm">'+esc(heroName)+'</div>'+(heroSub?'<div class="ds">'+esc(heroSub)+'</div>':'')+'</div>';
 d.header.forEach((hd,ci)=>{if(ci===nameCol)return;const val=(r[ci]==null?'':String(r[ci])).trim();if(!val)return;
  const lmap=parseNum(hd);const vmap=parseNum(val);let body='';
  if(lmap&&vmap){Object.keys(lmap).map(Number).sort((a,b)=>a-b).forEach(k=>{const vv=(vmap[k]||'').trim();if(!vv||vv==='-')return;body+='<div class="kv"><span class="k">'+esc(lmap[k])+'</span><span class="v">'+esc(vv)+'</span></div>';});}
  else{val.split(' | ').map(x=>x.trim()).filter(x=>x&&x!=='-'&&!/^\d+\.$/.test(x)).forEach(pp=>{body+='<div class="plain">'+esc(pp)+'</div>';});}
  if(!body)return;h+='<div class="field"><h4>'+esc(secTitle(hd,schema,ci))+'</h4>'+body+'</div>';});
 app.innerHTML=h+'</div>';window.scrollTo(0,0);}};}
